<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <!-- Google Fonts: Syne (display) + DM Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bolt"></i>
                <span>ExpenSync AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-view="dashboard"><i class="fa-regular fa-compass"></i> Dashboard</a></li>
                <li><a href="#" class="nav-item" data-view="add-expense"><i class="fa-regular fa-circle-plus"></i> Add Expense</a></li>
                <li><a href="#" class="nav-item" data-view="settlements"><i class="fa-regular fa-handshake"></i> Settlements</a></li>
            </ul>
            <div class="user-profile">
                <div class="avatar">V</div>
                <div class="user-info">
                    <span class="user-name">Vigil</span>
                    <span class="user-role">Demo Mode</span>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- App Header -->
            <header class="app-header">
                <div class="header-left">
                    <button id="mobile-menu-toggle" class="icon-btn mobile-only">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Notifications"><i class="fa-regular fa-bell"></i></button>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container">
                <!-- Content injected via JS -->
            </div>
        </main>
        
        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Global Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Global Modal Container -->
        <div id="modal-container" class="modal-root">
            <div class="modal-backdrop"></div>
            <div class="modal-content-wrapper">
                <div id="modal-content" class="modal-card"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Reg Failed', err));
            });
        }
    </script>
</body>
</html>
